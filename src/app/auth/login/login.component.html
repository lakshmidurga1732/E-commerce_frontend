<div class="auth-page login-page">
  <div class="auth-card-wrap">
    <mat-card class="auth-card">
      <mat-card-header>
        <div class="auth-logo">
          <mat-icon>storefront</mat-icon>
          <span>ShopHub</span>
        </div>
        <mat-card-title>Welcome back</mat-card-title>
        <mat-card-subtitle>Sign in to continue shopping</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Email</mat-label>
            <input matInput type="email" formControlName="email" placeholder="you@example.com">
            <mat-icon matSuffix>email</mat-icon>
            <mat-error>Please enter a valid email address</mat-error>
          </mat-form-field>
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Password</mat-label>
            <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" placeholder="Enter your password">
            <button type="button" mat-icon-button matSuffix (click)="togglePasswordVisibility()" aria-label="Toggle password">
              <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
            <mat-error>Password must be at least 6 characters</mat-error>
          </mat-form-field>
          <button mat-raised-button type="submit" class="submit-btn" [disabled]="loginForm.invalid || isLoading">
            <span *ngIf="!isLoading">Sign in</span>
            <mat-spinner *ngIf="isLoading" diameter="24"></mat-spinner>
          </button>
        </form>
      </mat-card-content>
      <mat-card-actions class="auth-footer">
        <p class="auth-switch">Don't have an account? <a routerLink="/register">Create one</a></p>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
